<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Skate Street</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">STREET<span>SKATE</span></div>

  <nav>
    <a href="#">Início</a>
    <a href="#">Shapes</a>
    <a href="#">Tênis</a>
    <a href="#">Acessórios</a>
    <a href="#">Contato</a>
  </nav>

  <div class="icons">
    <input type="text" placeholder="Buscar...">
  </div>
</header>

<section class="hero">
  <div class="overlay"></div>
  <div class="hero-content">
    <h1>DOMINE AS RUAS</h1>
    <p>Shapes profissionais para seu estilo</p>
    <button>COMPRAR AGORA</button>
  </div>
</section>

<section class="produtos">
  <h2>DESTAQUES</h2>

  <div class="grid">

    <div class="card">
      <div class="img"></div>
      <div class="info">
        <h3>Shape Street Pro</h3>
        <p>R$ 199,90</p>
      </div>
    </div>

    <div class="card">
      <div class="img"></div>
      <div class="info">
        <h3>Shape Monster</h3>
        <p>R$ 219,90</p>
      </div>
    </div>

    <div class="card">
      <div class="img"></div>
      <div class="info">
        <h3>Shape Dark Skull</h3>
        <p>R$ 249,90</p>
      </div>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 StreetSkate</p>
</footer>

</body>
</html>
