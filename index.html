<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>StreetSkate</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #050505 url("https://img.freepik.com/psd-premium/modelo-de-banner-de-conceito-de-skate_23-2148577478.jpg") no-repeat center center fixed;
  background-size: cover;
  color: white;
  padding-top: 80px;
}

/* NAVBAR */
header {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

.logo span {
  color: #00ff88;
}

nav a {
  margin: 0 10px;
  color: white;
  text-decoration: none;
}

.cart {
  background: #00ff88;
  padding: 5px 10px;
  border-radius: 5px;
  color: black;
}

/* SLIDER */
.slider {
  position: relative;
  height: 80vh;
  overflow: hidden;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: 0.5s;
}

.slide.active {
  opacity: 1;
}

/* PRODUTOS */
.produtos {
  padding: 40px;
  text-align: center;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  width: 250px;
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00ff88;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.info {
  padding: 15px;
}

.btn {
  background: #00ff88;
  border: none;
  padding: 10px;
  cursor: pointer;
  width: 100%;
  transition: 0.3s;
  font-weight: bold;
}

.btn:hover {
  background: white;
}

/* MOBILE */
@media(max-width: 768px) {
  .grid {
    flex-direction: column;
    align-items: center;
  }

  .slider {
    height: 50vh;
  }
}

</style>
</head>

<body>

<header>
  <div class="logo">STREET<span>SKATE</span></div>
  <nav>
    <a href="#">Início</a>
    <a href="#">Shapes</a>
  </nav>
  <div class="cart">🛒 <span id="cart">0</span></div>
</header>

<!-- SLIDER (SKATE REAL) -->
<section class="slider">
  <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1508609349937-5ec4ae374ebf')"></div>
  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1518655048521-f130df041f66')"></div>
  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1520975916090-3105956dac38')"></div>
</section>

<!-- PRODUTOS -->
<section class="produtos">
  <h2>DESTAQUES</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1518655048521-f130df041f66">
      <div class="info">
        <h3>Shape Street Pro</h3>
        <p>R$199</p>
        <button class="btn" onclick="addCart()">COMPRAR</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
      <div class="info">
        <h3>Shape Skull</h3>
        <p>R$249</p>
        <button class="btn" onclick="addCart()">COMPRAR</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1508609349937-5ec4ae374ebf">
      <div class="info">
        <h3>Shape Street</h3>
        <p>R$219</p>
        <button class="btn" onclick="addCart()">COMPRAR</button>
      </div>
    </div>

  </div>
</section>

<script>

/* SLIDER */
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 3000);

/* CARRINHO */
let cart = 0;

function addCart() {
  cart++;
  document.getElementById("cart").innerText = cart;
}

</script>

</body>
</html>
